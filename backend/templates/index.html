<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Loan Risk Assessment</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl w-[700px] p-8">

<h1 class="text-3xl font-bold text-center mb-6">
AI Loan Risk Assessment
</h1>

<div class="grid grid-cols-2 gap-4">

<input id="limit" type="number" placeholder="Credit Limit"
class="border p-3 rounded-lg">

<input id="age" type="number" placeholder="Age"
class="border p-3 rounded-lg">

<select id="sex" class="border p-3 rounded-lg">
<option value="1">Male</option>
<option value="2">Female</option>
</select>

<select id="education" class="border p-3 rounded-lg">
<option value="1">Graduate</option>
<option value="2">University</option>
<option value="3">High School</option>
</select>

<select id="marriage" class="border p-3 rounded-lg">
<option value="1">Married</option>
<option value="2">Single</option>
</select>

<input id="pay0" type="number" placeholder="Last Month Payment Status"
class="border p-3 rounded-lg">

</div>

<button onclick="predict()"
class="mt-6 w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700">
Predict Loan Risk
</button>

<div id="result" class="mt-6 text-center text-lg font-semibold"></div>
<div id="suggestion" class="mt-3 text-center text-slate-600"></div>

<!-- Risk Meter -->
<div class="mt-6">
    <div class="w-full bg-gray-200 rounded-full h-4">
        <div id="riskBar"
             class="h-4 rounded-full transition-all duration-500"
             style="width:0%"></div>
    </div>
    <p id="riskPercent" class="text-center mt-2 font-semibold"></p>
    <div id="explanation"
     class="mt-4 text-sm text-slate-600 text-center"></div>
</div>

</div>

<script>

async function predict() {

try {

let limit = Number(document.getElementById("limit").value);
let age = Number(document.getElementById("age").value);
let sex = Number(document.getElementById("sex").value);
let edu = Number(document.getElementById("education").value);
let marriage = Number(document.getElementById("marriage").value);
let pay0 = Number(document.getElementById("pay0").value);

let features = [
limit, sex, edu, marriage, age,
pay0,0,0,0,0,0,
2000,2000,2000,2000,2000,2000,
500,500,500,500,500,500
];

const response = await fetch("http://127.0.0.1:5000/predict",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({features:features})
});

const data = await response.json();

let result = document.getElementById("result");
let suggestion = document.getElementById("suggestion");
let riskBar = document.getElementById("riskBar");
let riskPercent = document.getElementById("riskPercent");

let probValue = data.default_probability;
let percent = Math.round(probValue * 100);

riskPercent.innerText = "Risk Score: " + percent + "%";
riskBar.style.width = percent + "%";

if(probValue < 0.35){
    result.innerText = "🟢 Low Risk";
    riskBar.className = "h-4 rounded-full bg-green-500 transition-all duration-500";
    suggestion.innerText =
    "Customer shows stable repayment behaviour. Maintain timely payments.";
}
else if(probValue < 0.65){
    result.innerText = "🟡 Moderate Risk";
    riskBar.className = "h-4 rounded-full bg-yellow-400 transition-all duration-500";
    suggestion.innerText =
    "Some risk detected. Improving payment consistency can reduce default risk.";
}
else{
    result.innerText = "🔴 High Default Risk";
    riskBar.className = "h-4 rounded-full bg-red-500 transition-all duration-500";
    suggestion.innerText =
    "High risk detected. Reduce outstanding balances and avoid payment delays.";
}
let explanation = document.getElementById("explanation");

if(pay0 > 1){
    explanation.innerText =
    "Reason: Recent payment delays significantly increase default risk.";
}
else if(limit < 40000){
    explanation.innerText =
    "Reason: Lower credit limit is associated with higher repayment risk.";
}
else{
    explanation.innerText =
    "Reason: Stable financial indicators reduce default probability.";
}

} catch(error){
    console.log(error);
    alert("Prediction failed. Check backend.");
}
}
</script>
</body>
</html>
